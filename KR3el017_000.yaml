body:
  text: 斷死證秘訣金傷身損眼皮青定主身亡難救命若是氣喘與咆噎且在一七內中亡人中晝滿唇又青三日須知命必傾神仙留下真秘訣不說凡人不知音秘受不治法凡矢柱骨折不治凡兩目損傷不治凡口開氣出不收不治凡口如魚口不治凡傷食喉不治凡打破頭鼻流黃白水不治凡脊骨折斷不治凡心胞緊痛紅色高腫不治凡心口青色不治凡小腹陰陽不分不治凡小腹傷吐糞不治凡跌打大小腹痛不治凡腎子傷入小腹不治凡孕婦傷犯胎不治凡女人傷乳不治凡男人兩乳堂傷不治凡腰傷自笑不治凡兩臂墮下盡力叫嚎汗出如油者不治凡人手骨出一脛可治兩股齊出不可治受傷治法凡腦受傷使人輕輕扶正皮未破用二十號黑龍散已破用十四號桃花散填破口避風禁口自愈凡頂門受傷用二十四號止血散搽服俱用此藥凡氣喉受傷令人扶頭托湊喉管不使出氣用銀針連好外用十八號貼膏內服上部藥方凡眉甲骨出用椅圈將軟衣墊好令傷人坐圈中使一人捉定以絹縛之外用十八號貼膏內服上部藥方凡肩𦙴骨折必先使骨平正用十八號貼膏以油紙紮好內服六號接骨丹凡金井骨在脅下若損傷不宜夾縛扶平用二十六號黑龍散凡兩脅骨折如金井骨治法凡肩臂脫出令人抵住以抱著手臂輕輕送入故位內服六號接骨丹外貼十八號膏凡人膝蓋乃另生者跌出不治跌破者用篾箍以帶縛定外用二十四號止血散凡傷破腹大腸跌出被風吹其腸干不能收口用麻油操上使腸潤澤用一人托腸一人默含冷水噴潑傷人身上其人必然一驚托腸入即隨驚送入再用銀針連好先敷二十四號止血散後用十八號膏貼傷破目難看見用好酒一杯令傷者飲下即使人嗅傷如若有酒氣其腸已破難已救治凡人骨跌出內外折肉中用二十號寶麻藥一服再將肉破開取膏整換用二十四號止血散十八號貼膏外以筍箬包好內服六號接骨丹凡打傷跌腫肉中之骨不知碎而不碎醫人以手輕輕摸腫處若有聲者其骨已破先用二十號寶麻藥一服然後割開如血來不止用二十四號止血丹又用二十號寶麻藥一服再取骨出若骨碎甚即以別骨填接外貼十八號膏藥內服六號接骨丹凡平直處跌打骨傷皮不破先用二十號黑龍散敷好再用板夾縛平正如曲折之處只宜敷藥不宜挾縛免愈後不能伸屈凡服跌打藥要忌冷水冷物其藥必要熱服凡跌打傷重必先用二十七號藥水洗過然後敷藥輕傷不必如此凡跌打血來不止用二十五號桃花散或二十四號止血丹再不止用三七山羊血外用桃花散圈上凡骨未碎有輕者外用十八號貼膏內服上中下三部之藥照傷何部即用何部藥方凡山谷鄉村無藥鋪之處若遇跌打暫用糯米水酒姜蔥同搗包熨不使血凝內服老酒再治可也凡跌打藥宜瓷瓶收貯不使出氣凡人周身一百零八穴小穴七十二處大穴三十六處打中小穴重亦無妨打中大穴雖輕亦死今將三十六個大穴道明受傷治法頭頂心名為元宮穴打中者二日死輕者耳聾頭眩六十四日死先用加減湯加羌活一錢蒼耳子一錢五分次用奪命丹二三服再加藥酒常服前胸名華蓋穴打中者人事不省血迷心竅三日而死先用加減湯加枳實一錢良薑一錢次用七釐散二分後用奪命丹二三服後背心名肺底穴打中者兩鼻出血九日而死先用加減湯加百部八分桑皮一錢次用七釐散二分後用奪命丹二三服再用紫金丹右乳上一寸三分名上氣穴打中者發寒熱三十二日而死先用加減湯加沉香五分肉桂一錢五分次用七釐散二分後用奪命丹二三服左乳下一分名中氣穴打中者十二日而死先用加減湯加青皮一錢乳香一錢次用七釐散二分後用奪命丹二三服左乳下一寸四分名下氣穴打中者七日而死先用加減湯加枳實一錢五分石菖蒲一錢次用七釐散二分後用奪命丹二三服右乳上一寸三分名上血海打中者口中吐血十六日死先用加減湯加鬱金一錢二分沉香一錢次用七釐散二分再用奪命丹二三服右乳下一分名正血穴打中者口中吐血十八日死先用加減湯加鬱金一錢五分寄奴一錢五分次用七釐散二分再用奪命丹一二服右乳下一寸四分名下血海打中者三十六日吐血而死先用加減湯加五靈脂一錢二分蒲黃一錢炒黑次用七釐散二分再用奪命丹二三服心中名黑虎偷心穴打中者立刻眼目昏花人事不省拳回氣絕速宜治之先用加減湯加官桂一錢丁香六分次用七釐散二分再用奪命丹二三分再用紫金丹三四服心下一分名霍肺穴又下半分名肺底穴打中者劈面一把即醒然後用藥先用加減湯加桂枝一錢二分貝母一錢次用七釐散二分再用奪命丹二三服又服加減湯後用紫金丹心下一寸三分偏左一分名翻肚穴打中者比日而死先用加減湯加紅花一錢五分木香一錢次用七釐散二分仍用加減湯二三服再用奪命丹二三服又用紫金丹三四服或吊藥一敷臍下一寸五分名氣海穴打中者二十八日而死先用加減湯加杏仁一錢玄胡索一錢次用七釐散二分再用奪命丹二三服臍下三寸名丹田穴打中者十九日而死先用加減湯加木通一錢五分三稜一錢五分次用七釐散三分臍下四寸五分名分水穴打中者二便不通十三日而死先用加減湯加三稜一錢五分莪朮一錢生軍三錢次用七釐散二分再用紫金丹二三服臍下六寸名關元穴打中者五日而死先用加減湯加車前子一錢青皮一錢次用七釐散二三分再用奪命丹二三服左邊脅臍毛中名氣海穴打中者六個月而死先用加減湯加五加皮一錢羌活一錢次用七釐散二三分再用奪命丹三四服右邊脅臍毛中名血海門打中者五個月死先用加減湯加柴胡一錢二分當歸一錢次用七釐散二分再用奪命丹二三服或用藥酒常服左邊脅梢軟骨名章門穴打中者一百五十四日死先用加減湯加歸尾一錢蘇木一錢次用紫金丹三四服右邊脅梢軟骨名地門穴打中者六十日而死先用加減湯加丹皮一錢紅花一錢五分次用奪命丹二三服仍服加減湯下一分名血囊穴打中者四十日而死先用加減湯加蒲黃一錢韭菜子一錢次用奪命丹二三服再服藥酒兩耳下半分空處名聽耳穴打中者二十四日死先用加減湯加川芎一錢細辛五分次用奪命丹一二服再服藥酒背心第七個節兩邊下一分名石骨穴打中者吐痰吐血十個月而死先用加減湯加杜仲一錢骨碎補一錢次服奪命丹三四服下一寸一分名後氣穴打中者一季而死先用加減湯加補骨脂一錢烏藥一錢次用紫金丹三服再用藥酒兩腰眼中左邊名腎經穴打中者三日大哭而死先用加減湯加桃仁一錢五分紅花一錢次用奪命丹二三服右邊名命門穴打中者日事而死先用加減湯加桃仁一錢五分前胡一錢次用奪命丹三服尾梢盡下一分名海底穴打中者七日而死先用加減湯加生軍一錢朴硝一錢次用奪命丹二三服再用紫金丹三四服兩腿中同名鶴口穴打中者一季而死先用加減湯加牛膝一錢苡仁一錢次用紫金丹二三服左右腳𦙀中同名湧泉穴打中者十四個月死先用加減湯加牛膝一錢宣木瓜一錢次用奪命丹二三服以上三十六大穴指明受傷之法然用藥雖無久異不過加減湯及七釐散奪命紫金等藥惟加減方中所加二味零藥不可錯誤切宜緊記大凡人於既跌之後或相打受傷之後感冒經風發寒發熱頭身皆痛先用解肌湯或小柴胡湯治之然後再服跌打之藥通用方解肌湯廣皮一錢防風一錢葛根一錢木通一錢羌活一錢二分荊芥一錢五分前胡一錢桔梗一錢蘇葉一錢五分加蔥白三根姜三片水煎服小柴胡湯柴胡一錢桔梗八分連翹一錢二分花粉一錢五分葛根一錢黃芩一錢廣皮一錢木通一錢五分加燈心十根砂仁末五分水煎服十三味加減湯五加皮一錢五分枳殼一錢劉寄奴一錢肉桂一錢杜仲一錢五靈脂一錢蒲黃一錢歸尾一錢五分廣皮一錢二分紅花八分玄胡索一錢香附一錢五分青皮一錢加砂仁五分用陳酒煎服金瘡藥方生南星五錢生半夏五錢共研細末搽之吊藥方專治接骨入骱打傷骨頭止痛去傷赤芍二錢麝香五分乳香二錢沒藥二錢各研細末臨用糯米飯燒酒調塗七釐散專治跌打血迷心竅人事不省服之可行用冷粥即止硼砂八錢硃砂四錢血竭八錢土狗六錢地鱉八錢歸尾五錢紅花五錢蘇木四錢加皮四錢枳實五錢木香五錢大黃六錢巴霜三錢蒲黃三錢青皮三錢廣皮四錢烏藥三錢靈脂五錢三稜五錢莪朮五錢寸香一錢肉桂三錢猴骨三錢以上共研細末重者二分半輕者一分再輕七釐陳酒下飛龍奪命丹專治跌打接骨皆可服之當歸五錢赤芍二錢三稜四錢寸香二錢土狗三錢土鱉八錢莪朮四錢青皮三錢蒲黃二錢碎補三錢加皮八錢廣皮二錢硼砂八錢自然銅八錢木香六錢烏藥三錢硃砂二錢胡索四錢桂心三錢香附四錢寄奴三錢桂枝三錢血竭八錢羌活三錢前胡三錢貝母二錢葛根三錢秦艽三錢桃仁五錢蘇木四錢杜仲二錢猴骨二錢韭菜子二錢古錢四個醋酒浸共研細末重服三分輕分半再輕一分酒下地鱉紫金丹專治遠近跌打內傷面黃肌瘦四肢無力並腰痛皆服之青皮三錢黃芩三錢赤芩三錢烏藥三錢紅花三錢赤芍三錢血竭八錢硃砂二錢自然銅八錢土狗五錢土鱉三錢猴骨三錢虎骨八錢牛膝三錢靈仙三錢靈脂五錢木香二錢寸香三錢香附四錢肉桂三錢枳殼二錢丹皮四錢桃仁五錢貝母三錢寄奴三錢廣皮三錢蘇木三錢遠志二錢歸尾五錢桂枝三錢木通三錢三稜四錢莪朮四錢秦艽三錢加皮五錢續斷三錢杜仲三錢骨脂四錢碎補三錢羌活三錢葛根三錢蒲黃四錢澤瀉三錢松節五錢枸杞三錢韭菜子三錢硼砂八錢共研細末重服三分輕二分再輕一分酒下萬應回生膏專治遠近跌打接骨風氣周身大穴受傷貼即效生地五錢熟地五錢當歸二錢五分川烏二錢五分草烏五錢紅花五錢靈仙二錢五分寄奴二錢五分杜仲一錢五分木瓜一錢五分牛膝二錢五分胡索三錢桂枝二錢五分防風二錢五分骨脂二錢五分荊芥二錢五分獨活二錢赤芍一錢五分碎補五錢香附三錢桃仁三十粒升麻三錢丹皮二錢五分蘇木二錢五分青皮二錢五分烏藥二錢五分韭子二錢五分松節二錢五分秦艽二錢五分續斷二錢五分元參二錢麻黃二錢蒲黃二錢五分虎骨五錢猴骨三錢共研細末將麻油一斤血餘四兩煎好共熬成膏臨用加膏上末藥寸香七分丁香一錢血竭一錢木香一錢桂心一錢乳香一錢沒藥一錢香附一錢東母一錢蘇合油一錢勞傷藥酒方女人加益母草油發灰阿膠各四錢紅花二錢黃芩五錢烏藥五錢白茯苓五錢生地五錢當歸六錢加皮五錢骨脂三錢杜仲五錢牛膝五錢枳殼三錢桃仁四錢遠志五錢續斷三錢麥冬五錢秦艽五錢丹皮五錢枸節五錢桂枝三錢香附三錢澤瀉五錢胡索五錢虎骨八錢枸杞子六錢白鬍根三兩胡桃肉四兩大棗頭三兩以上等藥共置入好酒中隨飲勞傷丸藥方生地熟地加皮當歸丹皮黃芩杜仲黃耆麥冬天冬遠志川牛膝補骨脂柏子仁白茯苓各等分以上共研細末白蜜和丸白湯送下體仁子曰跌打損傷之症皆從血論損有重輕之不同傷有淺深之各異豈能一概而治乎蓋皮未破多用串皮破血之劑皮既已破多用通利兼補之方此乃跌打中之大要也學者用心詳焉今將秘方開列於後秘傳方君臣散第一肉桂童便浸一兩紅花酒洗五錢歸尾五錢生地五錢甘草梢五錢赤芍五錢烏藥五錢牛膝五錢玄胡索五錢杜